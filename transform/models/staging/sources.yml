version: 2

sources:
  - name: raw
    description: Raw orders loaded by the Cadence pipeline.
    tables:
      - name: raw_orders
        description: Synthetic UK-retail orders, one row per invoice line.
        columns:
          - name: invoice_no
            description: 6-digit invoice number.
          - name: stock_code
            description: 5-character product code.
          - name: description
            description: Product description.
          - name: quantity
            description: Units per transaction. Negative values are returns.
          - name: invoice_date
            description: Date and time of the transaction.
          - name: price
            description: Unit price in GBP.
          - name: customer_id
            description: Customer identifier. Nullable — ~5% of rows have no ID.
          - name: country
            description: Country of the customer.
          - name: run_date
            description: Airflow execution date that produced this batch.
